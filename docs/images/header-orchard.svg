<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 280" width="840" height="280">
  <defs>
    <style>
      @keyframes dot-pulse {
        0%, 100% { r: 4; opacity: 1; }
        50% { r: 6; opacity: 0.7; }
      }
      @keyframes slide-in {
        0% { transform: translateX(-10px); opacity: 0; }
        100% { transform: translateX(0); opacity: 1; }
      }
      @keyframes grow-bar {
        0% { width: 0; }
        100% { width: 100%; }
      }
      .bg { fill: #FAFAF9; }
      .title { fill: #1C1917; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-weight: 700; font-size: 44px; letter-spacing: -1px; }
      .subtitle { fill: #57534E; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-weight: 400; font-size: 16px; }
      .label { fill: #57534E; font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-weight: 400; font-size: 11px; letter-spacing: 2px; }
      .green { fill: #15803D; }
      .green-light { fill: #DCFCE7; }
      .green-stroke { stroke: #15803D; fill: none; stroke-width: 1.5; }
      .terracotta { fill: #C2410C; }
      .border { stroke: #E7E5E4; stroke-width: 1; fill: none; }
      .card-bg { fill: #F5F5F4; stroke: #E7E5E4; stroke-width: 1; }
      .card-title { fill: #1C1917; font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-weight: 600; font-size: 13px; }
      .card-desc { fill: #57534E; font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-weight: 400; font-size: 11px; }
      .pill-bg { fill: #F0FDF4; stroke: #BBF7D0; stroke-width: 1; }
      .pill-text { fill: #15803D; font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-weight: 500; font-size: 11px; }
      .stat-num { fill: #1C1917; font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-weight: 700; font-size: 28px; letter-spacing: -0.5px; }
      .stat-label { fill: #57534E; font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-weight: 400; font-size: 11px; }
      .pulse-dot { fill: #15803D; animation: dot-pulse 2s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="840" height="280" rx="8"/>
  <!-- Top green accent bar -->
  <rect class="green" x="0" y="0" width="840" height="3" rx="0"/>

  <!-- Left section -->
  <g transform="translate(48, 40)">
    <text class="label" x="0" y="12">MACOS VOICE INPUT</text>

    <!-- Title with green dot -->
    <circle class="pulse-dot" cx="-12" cy="58" r="4"/>
    <text class="title" x="0" y="66">Type4Me</text>

    <text class="subtitle" x="0" y="96">说话就能打字的 Mac 工具</text>
    <text class="subtitle" x="0" y="118">本地 AI 识别，自定义处理，完全免费</text>

    <!-- Pills -->
    <g transform="translate(0, 140)">
      <rect class="pill-bg" x="0" y="0" width="70" height="24" rx="12"/>
      <text class="pill-text" x="35" y="16" text-anchor="middle">开源</text>

      <rect class="pill-bg" x="80" y="0" width="70" height="24" rx="12"/>
      <text class="pill-text" x="115" y="16" text-anchor="middle">免费</text>

      <rect class="pill-bg" x="160" y="0" width="90" height="24" rx="12"/>
      <text class="pill-text" x="205" y="16" text-anchor="middle">macOS 14+</text>
    </g>
  </g>

  <!-- Vertical separator -->
  <line x1="400" y1="40" x2="400" y2="240" stroke="#E7E5E4" stroke-width="1"/>

  <!-- Right section: stats + features -->
  <g transform="translate(435, 40)">
    <!-- Stats row -->
    <g>
      <text class="stat-num" x="0" y="30">2</text>
      <text class="stat-label" x="0" y="46">本地模型</text>

      <text class="stat-num" x="110" y="30">7</text>
      <text class="stat-label" x="110" y="46">云端引擎</text>

      <text class="stat-num" x="220" y="30">$0</text>
      <text class="stat-label" x="220" y="46">完全免费</text>
    </g>

    <!-- Divider -->
    <line x1="0" y1="64" x2="360" y2="64" stroke="#E7E5E4" stroke-width="1"/>

    <!-- Feature list -->
    <g transform="translate(0, 82)">
      <circle class="green" cx="6" cy="6" r="3"/>
      <text class="card-title" x="18" y="10">流式识别</text>
      <text class="card-desc" x="100" y="10">SenseVoice + Qwen3 双引擎</text>
    </g>
    <g transform="translate(0, 108)">
      <circle class="green" cx="6" cy="6" r="3"/>
      <text class="card-title" x="18" y="10">文本处理</text>
      <text class="card-desc" x="100" y="10">润色 / 翻译 / 自定义 Prompt</text>
    </g>
    <g transform="translate(0, 134)">
      <circle class="green" cx="6" cy="6" r="3"/>
      <text class="card-title" x="18" y="10">词汇管理</text>
      <text class="card-desc" x="100" y="10">热词增强 + 映射纠错</text>
    </g>
    <g transform="translate(0, 160)">
      <circle class="green" cx="6" cy="6" r="3"/>
      <text class="card-title" x="18" y="10">历史记录</text>
      <text class="card-desc" x="100" y="10">全文搜索 / CSV 导出</text>
    </g>
  </g>
</svg>
