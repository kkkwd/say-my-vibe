<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Type4Me — 用声音，代替打字</title>
  <meta name="description" content="macOS 原生语音输入工具。免费、开源、可定制。">
  <style>
    :root {
      --bg: #F2EBE0;
      --surface: #FAF5ED;
      --input: #E8E3D8;
      --text: #1A1A1A;
      --text-secondary: #3D3D3D;
      --text-tertiary: #6B6B6B;
      --amber: #C78A26;
      --green: #4D9E59;
      --divider: #E8E3D8;
      --font: Inter, -apple-system, 'Helvetica Neue', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-weight: 300;
      line-height: 1.8;
      opacity: 0;
      animation: page-in 1s ease-out 0.15s forwards;
    }

    @keyframes page-in {
      to { opacity: 1; }
    }

    a { color: inherit; text-decoration: none; }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* --- Divider --- */
    .divider {
      border: none;
      border-top: 1px solid var(--divider);
      margin: 0;
    }

    /* --- Section label --- */
    .label {
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--amber);
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .label::before {
      content: '';
      display: block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--amber);
      flex-shrink: 0;
    }

    /* --- Hero --- */
    .hero {
      padding: 160px 0 120px;
    }

    .hero-brand {
      font-size: 0.8125rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--amber);
      margin-bottom: 28px;
    }

    .hero h1 {
      font-size: clamp(2.25rem, 5vw, 3rem);
      font-weight: 300;
      letter-spacing: 0.02em;
      line-height: 1.3;
      margin-bottom: 20px;
    }

    .hero .sub {
      font-size: 1rem;
      color: var(--text-tertiary);
      font-weight: 300;
      margin-bottom: 48px;
    }

    .btn {
      display: inline-block;
      padding: 12px 36px;
      background: var(--amber);
      color: #fff;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      border-radius: 6px;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.85; }

    /* --- Why --- */
    .why {
      padding: 100px 0 120px;
    }

    .why p {
      font-size: 1.0625rem;
      line-height: 2;
      color: var(--text-secondary);
      max-width: 580px;
    }

    /* --- Features --- */
    .features {
      padding: 100px 0 120px;
    }

    .feature {
      margin-bottom: 64px;
    }

    .feature:last-child {
      margin-bottom: 0;
    }

    .feature h3 {
      font-size: 1.0625rem;
      font-weight: 400;
      margin-bottom: 6px;
    }

    .feature p {
      font-size: 0.9375rem;
      color: var(--text-tertiary);
      font-weight: 300;
    }

    /* --- Download --- */
    .download {
      padding: 100px 0 120px;
    }

    .dl-info {
      font-size: 0.9375rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .dl-note {
      font-size: 0.8125rem;
      color: var(--text-tertiary);
      margin-bottom: 40px;
    }

    .dl-link {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--amber);
      letter-spacing: 0.04em;
    }

    .dl-link:hover { opacity: 0.7; }

    /* --- Footer --- */
    footer {
      padding: 48px 0 80px;
      font-size: 0.75rem;
      color: var(--text-tertiary);
      letter-spacing: 0.04em;
      text-align: center;
    }

    footer a { color: var(--text-tertiary); }
    footer a:hover { color: var(--amber); }

    /* --- Responsive --- */
    @media (max-width: 600px) {
      .wrap { padding: 0 20px; }
      .hero { padding: 100px 0 80px; }
      .why, .features, .download { padding: 72px 0 80px; }
      .feature { margin-bottom: 48px; }
      footer { padding: 36px 0 60px; }
    }
  </style>
</head>
<body>

  <div class="wrap">

    <section class="hero">
      <div class="hero-brand">Type4Me</div>
      <h1>用声音，代替打字</h1>
      <p class="sub">macOS 原生语音输入工具</p>
      <a class="btn" href="https://github.com/nickooo/Type4Me/releases/latest">下载</a>
    </section>

    <hr class="divider">

    <section class="why">
      <div class="label">为什么</div>
      <p>语音输入不该是月费服务。不该锁住你的数据。不该千篇一律。我们做了一个免费、开源、可定制的。</p>
    </section>

    <hr class="divider">

    <section class="features">
      <div class="label">能力</div>

      <div class="feature">
        <h3>本地识别</h3>
        <p>SenseVoice + Qwen3，离线运行</p>
      </div>

      <div class="feature">
        <h3>云端扩展</h3>
        <p>七家供应商按需切换</p>
      </div>

      <div class="feature">
        <h3>文本处理</h3>
        <p>润色、翻译、自定义 Prompt</p>
      </div>

      <div class="feature">
        <h3>词汇校准</h3>
        <p>热词增强 + 映射纠错</p>
      </div>
    </section>

    <hr class="divider">

    <section class="download">
      <div class="label">下载</div>
      <p class="dl-info">完整版 1.2GB · 精简版 23MB</p>
      <p class="dl-note">macOS 14+</p>
      <a class="dl-link" href="https://github.com/nickooo/Type4Me/releases/latest">下载 Type4Me →</a>
    </section>

    <hr class="divider">

    <footer>
      Type4Me · 2024–2026 · <a href="https://github.com/nickooo/Type4Me">GitHub</a>
    </footer>

  </div>

</body>
</html>
